name: Build

on:
  push:
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  build:
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked
        shell: bash

      - name: Rename binary
        run: |
          mkdir -p upload
          cp target/release/scrippiscrappa upload/scrippiscrappa-${{ matrix.os }}-${{ matrix.target }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scrippiscrappa-${{ matrix.os }}-${{ matrix.target }}
          path: upload/scrippiscrappa-${{ matrix.os }}-${{ matrix.target }}
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: scrippiscrappa-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: scrippiscrappa v0.1.0
          body: "Pre-built binaries for Linux and macOS"
          files: artifacts/scrippiscrappa-*
